name: UMI.CMS module preflight
about: Request a static package review before NFR testing or UMI.Market submission
title: "[UMI Preflight] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Опишите только структуру и назначение пакета. Не публикуйте рабочие доступы, клиентские данные или закрытые файлы.
  - type: input
    id: module
    attributes:
      label: Название модуля
      placeholder: example-module
    validations:
      required: true
  - type: input
    id: umi_version
    attributes:
      label: Версия UMI.CMS
      placeholder: Точная версия или диапазон
  - type: input
    id: php_version
    attributes:
      label: Версия PHP
      placeholder: Например, 8.1
  - type: dropdown
    id: service
    attributes:
      label: Нужный формат
      options:
        - Отчёт по пакету — 2 500 ₽
        - Отчёт и исправление типовых ошибок — 5 000 ₽
        - Адаптация под правила студии — от 10 000 ₽
    validations:
      required: true
  - type: textarea
    id: structure
    attributes:
      label: Структура пакета
      description: Перечислите основные файлы и папки без их закрытого содержимого.
      placeholder: install.php, admin.php, classes/...
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Что нужно проверить
      placeholder: Установка, административная часть, обработчики событий, упаковка, PHP-совместимость...
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Подтверждение
      options:
        - label: В заявке нет рабочих доступов и клиентских данных
          required: true
