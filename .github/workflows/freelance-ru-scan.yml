name: Freelance.ru task scan

on:
  push:
    branches:
      - "freelance-ru-scan"
    paths:
      - "scripts/freelance_ru_scan.py"
      - "tests/test_freelance_ru_scan.py"
      - ".github/workflows/freelance-ru-scan.yml"
  pull_request:
    paths:
      - "scripts/freelance_ru_scan.py"
      - "tests/test_freelance_ru_scan.py"
      - ".github/workflows/freelance-ru-scan.yml"
  workflow_dispatch:
  schedule:
    - cron: "11 */3 * * *"

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run tests
        run: python -m unittest discover -s tests -p "test_freelance_ru_scan.py" -v
      - name: Scan public tasks
        run: python scripts/freelance_ru_scan.py artifacts/freelance-ru-scan --pages 8 --max-applications 5 --max-age-hours 72
      - name: Show summary
        run: cat artifacts/freelance-ru-scan/freelance-ru.md
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: freelance-ru-scan
          path: artifacts/freelance-ru-scan
          retention-days: 7
