name: Public task scan

on:
  push:
    branches:
      - "freelance-ru-scan"
    paths:
      - "scripts/public_task_scan.py"
      - "scripts/public_task_scan_v2.py"
      - "tests/test_public_feed.py"
      - ".github/workflows/freelance-ru-scan.yml"
  workflow_dispatch:
  schedule:
    - cron: "11 */3 * * *"

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run parser tests
        run: python -m unittest discover -s tests -p "test_public_feed.py" -v
      - name: Scan public tasks
        run: python scripts/public_task_scan_v2.py artifacts/public-task-scan --pages 8 --max-applications 5 --max-age-hours 72
      - name: Show summary
        run: cat artifacts/public-task-scan/public-tasks.md
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: public-task-scan
          path: artifacts/public-task-scan
          retention-days: 7
