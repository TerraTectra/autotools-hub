name: Apply RetailCRM SLA Journal positioning

on:
  push:
    branches:
      - agent/retailcrm-positioning-v2
    paths:
      - .github/workflows/apply-retailcrm-positioning-v2.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/retailcrm-positioning-v2
          fetch-depth: 0
      - name: Align product messaging and validate
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          readme_path=Path('prototypes/retailcrm-sla-guard/README.md')
          readme=readme_path.read_text()
          replacements=[
            (
              'RetailCRM SLA Guard detects orders that remain in one status longer than the configured SLA and sends a Telegram alert. The repository supports two modes:',
              'RetailCRM SLA Guard records order-status SLA breaches, highlights recurring bottlenecks and uses Telegram as an escalation channel. The repository supports two modes:',
            ),
            (
              '**https://terratectra.github.io/autotools-hub/site/**\n\nThe demo does not connect to RetailCRM and does not collect credentials or customer data.',
              '**https://terratectra.github.io/autotools-hub/site/**\n\nA separate public journal and analytics demonstration is available at:\n\n**https://terratectra.github.io/autotools-hub/site/incidents.html**\n\nThe demonstrations do not connect to RetailCRM and do not collect credentials or customer data.',
            ),
            (
              '- [Bilingual Marketplace card and pricing proposal](MARKETPLACE_SUBMISSION.md)',
              '- [Bilingual Marketplace card and pricing proposal](MARKETPLACE_SUBMISSION.md)\n- [Competitive positioning and sales boundaries](COMPETITIVE_POSITIONING.md)',
            ),
            (
              '1. Reads orders through `GET /api/v5/orders`.\n2. Compares `statusUpdatedAt` with the threshold configured for `extendedStatus` (or `status`).\n3. Sends a Telegram message for newly detected breaches.\n4. Stores sent alert keys so the same status breach is not reported twice.',
              '1. Reads orders through `GET /api/v5/orders`.\n2. Compares `statusUpdatedAt` with the threshold configured for `extendedStatus` (or `status`).\n3. Records a privacy-safe SLA incident and updates managerial analytics.\n4. Sends a Telegram escalation for the newly detected breach.\n5. Stores sent alert keys so the same status breach is not reported twice.',
            ),
            (
              'The check runs syntax validation and unit tests for SLA detection, privacy-safe alerts, HMAC verification, AES-256-GCM credential encryption, domain validation, registration parameters and atomic tenant persistence. It also starts the Marketplace HTTP server in a process-level smoke test.',
              'The check runs syntax validation and unit tests for SLA detection, privacy-safe alerts, incident history, managerial analytics, spreadsheet-safe CSV export, HMAC verification, AES-256-GCM credential encryption, domain validation, registration parameters and atomic tenant persistence. It also starts the Marketplace HTTP server in a process-level smoke test.',
            ),
            (
              '- Telegram group routing;\n- links back to the order card;',
              '- Telegram escalation routing;\n- privacy-safe incident history and status analytics;\n- links back to the order card;',
            ),
          ]
          for old,new in replacements:
              count=readme.count(old)
              if count!=1: raise SystemExit(f'README marker count {count}: {old[:60]}')
              readme=readme.replace(old,new,1)
          readme_path.write_text(readme)

          site_path=Path('site/index.html')
          site=site_path.read_text()
          site_replacements=[
            ('<h1>Заказы больше не зависают молча.</h1>', '<h1>Задержки становятся измеримым процессом.</h1>'),
            (
              '<p class="lead">SLA Guard находит заказы, которые слишком долго остаются в статусе, и сообщает ответственным до того, как задержка превращается в потерянную продажу.</p>',
              '<p class="lead">SLA Guard фиксирует нарушения, показывает повторяющиеся узкие места и эскалирует новые задержки руководителю до того, как они становятся системной потерей.</p>',
            ),
            (
              '<div class="section-head"><div><div class="eyebrow">Готовый продукт</div><h2>Не просто демонстрация</h2></div><p>Backend уже реализует подключение RetailCRM Marketplace, безопасное хранение секретов и работу с несколькими клиентами.</p></div>',
              '<div class="section-head"><div><div class="eyebrow">Управленческий продукт</div><h2>Больше, чем Telegram-уведомление</h2></div><p>Backend ведёт обезличенную историю, считает показатели по статусам и поддерживает безопасное подключение RetailCRM Marketplace.</p></div>',
            ),
            (
              '<article class="feature"><div class="feature-number">07</div><h3>Журнал нарушений</h3><p>Обезличенная история инцидентов и безопасный CSV для операционных разборов. <a href="incidents.html">Посмотреть демо →</a></p></article>',
              '<article class="feature"><div class="feature-number">07</div><h3>Журнал и аналитика</h3><p>История инцидентов, показатели за сутки и неделю, проблемные статусы и безопасный CSV. <a href="incidents.html">Посмотреть демо →</a></p></article>',
            ),
          ]
          for old,new in site_replacements:
              count=site.count(old)
              if count!=1: raise SystemExit(f'SITE marker count {count}: {old[:60]}')
              site=site.replace(old,new,1)
          site_path.write_text(site)
          PY
          cd prototypes/retailcrm-sla-guard
          npm run check
          cd ../..
          test -s site/index.html
          test -s site/incidents.html
          grep -q 'SLA Journal — журнал и аналитика задержек' prototypes/retailcrm-sla-guard/MARKETPLACE_SUBMISSION.md
          grep -q 'Оповещения в Telegram от Radis' prototypes/retailcrm-sla-guard/COMPETITIVE_POSITIONING.md
          grep -q 'Задержки становятся измеримым процессом' site/index.html
          grep -q 'Главный статус' site/incidents.html
          ! grep -RIE '(api[_-]?key|telegram[_-]?bot[_-]?token)[[:space:]]*[:=][[:space:]]*[A-Za-z0-9_-]{12,}' site
          rm .github/workflows/apply-retailcrm-positioning-v2.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'docs: position SLA Guard as a managerial SLA Journal'
          git push origin HEAD:agent/retailcrm-positioning-v2
