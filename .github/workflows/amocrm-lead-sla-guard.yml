name: amoCRM Lead SLA Guard

on:
  push:
    paths:
      - "prototypes/amocrm-lead-sla-guard/**"
      - ".github/workflows/amocrm-lead-sla-guard.yml"
  pull_request:
    paths:
      - "prototypes/amocrm-lead-sla-guard/**"
      - ".github/workflows/amocrm-lead-sla-guard.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run check
        working-directory: prototypes/amocrm-lead-sla-guard
