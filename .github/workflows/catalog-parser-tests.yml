name: Catalog parser tests

on:
  pull_request:
    paths:
      - "prototypes/catalog-parser-starter/**"
      - ".github/workflows/catalog-parser-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: prototypes/catalog-parser-starter/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r prototypes/catalog-parser-starter/requirements.txt

      - name: Run tests
        run: pytest -q prototypes/catalog-parser-starter/tests
