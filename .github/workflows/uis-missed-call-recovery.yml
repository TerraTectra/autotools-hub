name: UIS Missed Call Recovery

on:
  pull_request:
    paths:
      - "prototypes/uis-missed-call-recovery/**"
      - ".github/workflows/uis-missed-call-recovery.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prototypes/uis-missed-call-recovery
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run check
