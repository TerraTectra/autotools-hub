name: RetailCRM SLA Guard

on:
  pull_request:
    paths:
      - "prototypes/retailcrm-sla-guard/**"
      - ".github/workflows/retailcrm-sla-guard.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prototypes/retailcrm-sla-guard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run check
