name: RetailCRM SLA Guard Demo Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/retailcrm-demo-pages.yml"
  pull_request:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/retailcrm-demo-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate static demo
        shell: bash
        run: |
          set -euo pipefail
          test -s site/index.html
          grep -q '<!doctype html>' site/index.html
          grep -q 'RetailCRM SLA Guard' site/index.html
          grep -q 'id="demo"' site/index.html
          ! grep -RIE '(api[_-]?key|telegram[_-]?bot[_-]?token)[[:space:]]*[:=][[:space:]]*[A-Za-z0-9_-]{12,}' site

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload demo artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - name: Deploy demo
        id: deployment
        uses: actions/deploy-pages@v4
