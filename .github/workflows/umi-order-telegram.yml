name: UMI.CMS Telegram Order Status

on:
  push:
    paths:
      - "prototypes/umi-order-telegram/**"
      - ".github/workflows/umi-order-telegram.yml"
  pull_request:
    paths:
      - "prototypes/umi-order-telegram/**"
      - ".github/workflows/umi-order-telegram.yml"
  workflow_dispatch:

jobs:
  test-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run preflight checks and create review archive
        run: sh scripts/preflight.sh
        working-directory: prototypes/umi-order-telegram
      - name: Upload review archive
        uses: actions/upload-artifact@v4
        with:
          name: terratectra-order-telegram-review
          path: |
            prototypes/umi-order-telegram/dist/terratectra_order_telegram-review.tar.gz
            prototypes/umi-order-telegram/dist/terratectra_order_telegram-review.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14
