name: Diagnose Telegram CTA

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/retailcrm-telegram-cta-v3'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/retailcrm-telegram-cta-v3
      - name: Inspect contact anchors
        shell: python
        run: |
          from pathlib import Path
          import re

          output = []
          for path in map(Path, ('site/index.html', 'site/incidents.html', 'site/calculator.html')):
              text = path.read_text(encoding='utf-8')
              output.append(f'## {path}')
              output.append(f'telegram_count={text.count("https://t.me/tahioff")}')
              output.append(f'external_script_count={text.lower().count("<script src=")}')
              output.append(f'index_marker={text.count("        <a class=\"button\" href=\"mailto:")}')
              output.append(f'incident_marker={text.count("          <a class=\"button primary\" href=\"mailto:")}')
              output.append(f'calculator_marker={text.count("          <a class=\"button primary\" id=\"contact\" href=\"mailto:")}')
              for anchor in re.findall(r'<a[^>]+href="mailto:[^"]+"[^>]*>[^<]*</a>', text):
                  output.append(anchor)
              output.append('')
          Path('telegram-debug.txt').write_text('\n'.join(output), encoding='utf-8')
          print('\n'.join(output))
      - uses: actions/upload-artifact@v4
        with:
          name: telegram-cta-diagnostics
          path: telegram-debug.txt
          retention-days: 1
