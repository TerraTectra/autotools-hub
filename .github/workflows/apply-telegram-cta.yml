name: Apply Telegram CTA

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/retailcrm-telegram-cta-v3'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/retailcrm-telegram-cta-v3
          fetch-depth: 0
      - name: Add written Telegram contact
        shell: python
        run: |
          from pathlib import Path

          telegram = '<a class="button" href="https://t.me/tahioff" rel="noopener">Telegram @tahioff</a>'

          replacements = {
              'site/index.html': (
                  '        <a class="button" href="mailto:',
                  f'        {telegram}\n        <a class="button" href="mailto:',
              ),
              'site/incidents.html': (
                  '          <a class="button primary" href="mailto:',
                  f'          {telegram}\n          <a class="button primary" href="mailto:',
              ),
              'site/calculator.html': (
                  '          <a class="button primary" id="contact" href="mailto:',
                  f'          {telegram}\n          <a class="button primary" id="contact" href="mailto:',
              ),
          }

          for path, (marker, replacement) in replacements.items():
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              if 'https://t.me/tahioff' in text:
                  raise SystemExit(f'{path} already contains Telegram CTA')
              if marker not in text:
                  raise SystemExit(f'{path}: insertion marker not found')
              text = text.replace(marker, replacement, 1)
              if text.count('https://t.me/tahioff') != 1:
                  raise SystemExit(f'{path}: Telegram CTA insertion failed')
              if '<script src=' in text.lower():
                  raise SystemExit(f'{path}: unexpected external script')
              file.write_text(text, encoding='utf-8')
      - name: Commit clean patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'TerraTectra Automation'
          git config user.email 'actions@users.noreply.github.com'
          git rm .github/workflows/apply-telegram-cta.yml
          git rm -f tmp/noop.txt || true
          git add site/index.html site/incidents.html site/calculator.html
          git commit -m 'feat: add Telegram contact CTA to SLA Journal pages'
          git push origin HEAD:agent/retailcrm-telegram-cta-v3
