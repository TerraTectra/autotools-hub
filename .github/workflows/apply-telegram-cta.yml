name: Apply Telegram CTA

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/retailcrm-telegram-cta-v3'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/retailcrm-telegram-cta-v3
          fetch-depth: 0
      - name: Add written Telegram contact
        shell: python
        run: |
          from pathlib import Path
          import re

          telegram = '<a class="button" href="https://t.me/tahioff" rel="noopener">Telegram @tahioff</a>'

          def add_before_email(path, prefer_primary=False):
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              if 'https://t.me/tahioff' in text:
                  raise SystemExit(f'{path} already contains Telegram CTA')
              css_class = 'button primary' if prefer_primary else 'button'
              pattern = rf'<a\s+class="{re.escape(css_class)}"[^>]*href="mailto:[^"]+"[^>]*>[^<]+</a>'
              match = re.search(pattern, text)
              if not match:
                  raise SystemExit(f'Email CTA not found in {path}')
              replacement = telegram + '\n          ' + match.group(0)
              file.write_text(text[:match.start()] + replacement + text[match.end():], encoding='utf-8')

          add_before_email('site/index.html', prefer_primary=False)
          add_before_email('site/incidents.html', prefer_primary=True)
          add_before_email('site/calculator.html', prefer_primary=True)

          for path in map(Path, ('site/index.html', 'site/incidents.html', 'site/calculator.html')):
              content = path.read_text(encoding='utf-8')
              if content.count('https://t.me/tahioff') != 1:
                  raise SystemExit(f'{path} must contain exactly one Telegram CTA')
              if '<script src=' in content.lower():
                  raise SystemExit(f'{path} unexpectedly contains an external script')
      - name: Commit clean patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'TerraTectra Automation'
          git config user.email 'actions@users.noreply.github.com'
          git rm .github/workflows/apply-telegram-cta.yml
          git rm -f tmp/noop.txt || true
          git add site/index.html site/incidents.html site/calculator.html
          git commit -m 'feat: add Telegram contact CTA to SLA Journal pages'
          git push origin HEAD:agent/retailcrm-telegram-cta-v3
