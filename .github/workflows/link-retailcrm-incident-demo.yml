name: Link RetailCRM incident demo

on:
  push:
    branches:
      - agent/retailcrm-incident-demo
    paths:
      - .github/workflows/link-retailcrm-incident-demo.yml

permissions:
  contents: write

jobs:
  link:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/retailcrm-incident-demo
          fetch-depth: 0
      - name: Link and validate incident demo
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path=Path('site/index.html')
          html=path.read_text()
          replacements=[
            ('<a href="#demo">Демонстрация</a>\n        <a href="#features">', '<a href="#demo">Демонстрация</a>\n        <a href="incidents.html">Журнал SLA</a>\n        <a href="#features">'),
            ('<a class="button primary" href="#demo">Запустить демонстрацию</a>\n          <a class="button" href="https://github.com/TerraTectra/autotools-hub/tree/main/prototypes/retailcrm-sla-guard">', '<a class="button primary" href="#demo">Запустить демонстрацию</a>\n          <a class="button" href="incidents.html">Открыть журнал нарушений</a>\n          <a class="button" href="https://github.com/TerraTectra/autotools-hub/tree/main/prototypes/retailcrm-sla-guard">'),
            ('<article class="feature"><div class="feature-number">06</div><h3>Проверяемая сборка</h3><p>Unit-тесты, процессный smoke-тест, Docker и GitHub Actions.</p></article>', '<article class="feature"><div class="feature-number">06</div><h3>Проверяемая сборка</h3><p>Unit-тесты, процессный smoke-тест, Docker и GitHub Actions.</p></article>\n          <article class="feature"><div class="feature-number">07</div><h3>Журнал нарушений</h3><p>Обезличенная история инцидентов и безопасный CSV для операционных разборов. <a href="incidents.html">Посмотреть демо →</a></p></article>'),
          ]
          for old,new in replacements:
              count=html.count(old)
              if count!=1: raise SystemExit(f'Expected one replacement marker, found {count}: {old[:50]}')
              html=html.replace(old,new,1)
          path.write_text(html)
          PY
          test -s site/index.html
          test -s site/incidents.html
          grep -q 'href="incidents.html"' site/index.html
          grep -q 'id="download"' site/incidents.html
          grep -q 'retailcrm-sla-incidents-demo.csv' site/incidents.html
          ! grep -RIE '(api[_-]?key|telegram[_-]?bot[_-]?token)[[:space:]]*[:=][[:space:]]*[A-Za-z0-9_-]{12,}' site
          rm .github/workflows/link-retailcrm-incident-demo.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: link SLA incident journal from public demo'
          git push origin HEAD:agent/retailcrm-incident-demo
