name: amoCRM Health Check
on:
  pull_request:
    paths:
      - prototypes/amocrm-connection-recovery/**
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run check
        working-directory: prototypes/amocrm-connection-recovery
